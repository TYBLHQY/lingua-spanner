name: Build Plasmoid

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++ \
            qt6-base-dev \
            qt6-declarative-dev \
            jq

      - name: Extract version from metadata.json
        id: version
        run: |
          VERSION=$(jq -r '.KPlugin.Version' package/metadata.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches metadata.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          METADATA_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$METADATA_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match metadata.json version ${METADATA_VERSION}"
            exit 1
          fi
          echo "Tag verified: v${TAG_VERSION} matches metadata.json"

      - name: Configure CMake
        run: cmake -B build -DCMAKE_INSTALL_PREFIX=$HOME/.local

      - name: Build C++ helper module
        run: cmake --build build -j$(nproc)

      - name: Stage QML module files into package
        run: |
          mkdir -p package/contents/lib/LinguaSpannerHelper
          cp -a "$HOME/.local/lib/qml/LinguaSpannerHelper/"* \
                package/contents/lib/LinguaSpannerHelper/

      - name: Package plasmoid
        run: |
          cd package && tar czf "../lingua-spanner-${{ steps.version.outputs.version }}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingua-spanner-${{ steps.version.outputs.version }}
          path: lingua-spanner-${{ steps.version.outputs.version }}.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Lingua Spanner v${{ steps.version.outputs.version }}
          files: lingua-spanner-${{ steps.version.outputs.version }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
